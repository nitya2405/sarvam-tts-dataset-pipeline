audio:
  sample_rate: 24000
  channels: 1
  bit_depth: 16
  loudness_target_lufs: -23.0
  true_peak_ceiling_dbtp: -1.0
  highpass_cutoff_hz: 80
  silence_trim_padding_ms: 175
  min_clip_duration_s: 45
  max_clip_duration_s: 60
  merge_gap_threshold_s: 3.0
  silence_detection_threshold_db: -40
  silence_min_len_ms: 200

sarvam:
  # Saaras v3 is the current model. Both phases use the SDK's job lifecycle:
  # create → upload → start → wait → download. REST API is < 30s only.
  batch_model: saaras:v3
  diarization_mode: transcribe   # mode param for Phase 2 (diarization on)
  transcription_mode: verbatim   # mode param for Phase 4 (verbatim, no diarization)
  cost_per_hour_inr: 45.0

paths:
  raw: data/raw
  segments: data/segments
  clips: data/clips
  metadata: metadata
  sources: config/sources.csv
  source_log: metadata/source_log.csv
  clips_metadata: metadata/clips_metadata.csv

emotion_tags:
  - neutral
  - formal
  - happy_excited
  - sad
  - angry
  - calm_reverent
  - conversational_casual
  - intense_dramatic

language_codes:
  en: en-IN
  hi: hi-IN
