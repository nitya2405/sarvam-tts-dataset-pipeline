audio:
  sample_rate: 24000
  channels: 1
  bit_depth: 16
  loudness_target_lufs: -23.0
  true_peak_ceiling_dbtp: -1.0
  highpass_cutoff_hz: 80
  silence_trim_padding_ms: 175
  min_clip_duration_s: 45
  max_clip_duration_s: 60
  merge_gap_threshold_s: 1.0
  silence_detection_threshold_db: -40
  silence_min_len_ms: 200

sarvam:
  base_url: https://api.sarvam.ai
  # Saaras v3 is the current recommended model (saarika v2.5 is legacy/phased out)
  # Both diarization and transcription use the Batch API (async) because:
  #   - REST API limit: < 30 seconds
  #   - Batch API: up to 2 hours, only mode supporting diarization
  # Verify endpoint paths against https://docs.sarvam.ai before running
  batch_model: saaras:v3
  batch_submit_path: /speech-to-text/batch
  batch_status_path: /speech-to-text/batch/{job_id}
  cost_per_hour_inr: 45.0
  batch_submit_timeout_s: 120
  batch_poll_interval_s: 15
  batch_max_wait_s: 7200
  upload_format: mp3
  upload_bitrate: 128k

paths:
  raw: data/raw
  segments: data/segments
  clips: data/clips
  metadata: metadata
  sources: config/sources.csv
  source_log: metadata/source_log.csv
  clips_metadata: metadata/clips_metadata.csv

emotion_tags:
  - neutral
  - formal
  - happy_excited
  - sad
  - angry
  - calm_reverent
  - conversational_casual
  - intense_dramatic

language_codes:
  en: en-IN
  hi: hi-IN
